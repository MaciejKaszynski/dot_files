start-at-login = false 

# Layout - BSP equivalent in AeroSpace is "tiles" (binary space partitioning)
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Padding (yabai's padding + gap equivalent)
[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.right      = 5
outer.top        = 5
outer.bottom     = 5

# Focus follows mouse
# on-focus-changed = ['move-mouse window-lazy-center']
# Note: AeroSpace doesn't have true autofocus on hover.
# This moves the cursor to the focused window instead.
# For hover-to-focus, you'd need a separate tool like "Cursor Follows Focus" setting in accessibility.

# Key bindings
[mode.main.binding]

# Open terminal (alt + return)
alt-enter = 'exec-and-forget open -na wezterm'

# Close window (alt + shift + q)
alt-shift-q = 'close'

# Switch to space (alt + 1-4)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'

# Move window to space (alt + shift + 1-4)
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']

# Toggle float (alt + t)
alt-t = 'layout floating tiling'  # toggles between floating and tiling
